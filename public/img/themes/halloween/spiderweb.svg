<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <defs>
    <radialGradient id="webGradient">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#cccccc;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  <!-- Telaraña radial -->
  <g stroke="url(#webGradient)" stroke-width="0.8" fill="none" opacity="0.7">
    <!-- Círculos concéntricos -->
    <circle cx="50" cy="50" r="8" />
    <circle cx="50" cy="50" r="16" />
    <circle cx="50" cy="50" r="24" />
    <circle cx="50" cy="50" r="32" />
    <circle cx="50" cy="50" r="40" />
    
    <!-- Líneas radiales -->
    <line x1="50" y1="50" x2="50" y2="10" />
    <line x1="50" y1="50" x2="78.66" y2="21.34" />
    <line x1="50" y1="50" x2="90" y2="50" />
    <line x1="50" y1="50" x2="78.66" y2="78.66" />
    <line x1="50" y1="50" x2="50" y2="90" />
    <line x1="50" y1="50" x2="21.34" y2="78.66" />
    <line x1="50" y1="50" x2="10" y2="50" />
    <line x1="50" y1="50" x2="21.34" y2="21.34" />
  </g>
  <!-- Pequeña araña en la esquina -->
  <g transform="translate(5, 5)" opacity="0.8">
    <ellipse cx="4" cy="4" rx="3" ry="2.5" fill="#222" />
    <circle cx="4" cy="2" r="2" fill="#333" />
    <!-- Patas -->
    <path d="M 4,4 L 0,2 M 4,4 L 0,6 M 4,4 L 8,2 M 4,4 L 8,6" stroke="#222" stroke-width="0.6" fill="none" />
  </g>
</svg>

